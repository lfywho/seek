<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seek - Início</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>

<body>

    <header class="cabecalho">
    </header>
    <section class="categories-carousel">

        <div class="carousel-wrapper">
            <button class="carousel-btn prev" aria-label="Categorias anteriores">&#10094;</button>

            <div class="carousel-viewport">
                <div class="carousel-track" id="categoriesTrack">
                    <!-- JS vai inserir aqui -->
                </div>
            </div>

            <button class="carousel-btn next" aria-label="Próximas categorias">&#10095;</button>
        </div>
    </section>
    <main class="conteudo">

        <section class="feedImgs" id="feedContainer" aria-label="Feed de projetos">
            <!-- JS vai inserir os posts aqui -->
        </section>

        <div class="post-modal" id="postModal" hidden>
            <button type="button" class="post-modal__overlay" aria-label="Fechar modal"></button>

            <div class="post-modal__content" role="dialog" aria-modal="true" aria-labelledby="modalPostTitulo">
                <button type="button" class="post-modal__close" aria-label="Fechar modal">×</button>

                <header class="post-modal__header">
                    <div class="post-modal__identity">
                        <img id="modalAuthorAvatar" class="post-modal__avatar" src="img/userProfile.png" alt="Autor do post">

                        <div class="post-modal__identity-text">
                            <h2 id="modalPostTitulo">Título do projeto</h2>
                            <p id="modalAuthorName">Nome do autor</p>
                        </div>
                    </div>

                    <div class="post-modal__actions" aria-label="Ações do post">
                        <button type="button" class="post-modal__icon-btn" id="modalShare" aria-label="Compartilhar">
                            <img class="post-modal__icon-image" src="img/icons/Share.svg" alt="">
                        </button>

                        <button type="button" class="post-modal__icon-btn" id="modalLike" aria-label="Curtir">
                            <img class="post-modal__icon-image" src="img/icons/like.svg" alt="">
                        </button>

                        <button type="button" class="post-modal__icon-btn" id="modalFavorite" aria-label="Salvar">
                            <img class="post-modal__icon-image" src="img/icons/favoritos.svg" alt="">
                        </button>

                        <button type="button" class="post-modal__icon-btn" id="modalInfo" aria-label="Informações">
                            <img class="post-modal__icon-image" src="img/icons/ajuda.svg" alt="">
                        </button>

                        <button type="button" class="post-modal__icon-btn" id="modalComments" aria-label="Detalhes do post">
                            <img class="post-modal__icon-image" src="img/icons/email.svg" alt="">
                        </button>
                    </div>
                </header>

                <div class="post-modal__gallery" id="modalGallery" aria-label="Galeria do projeto"></div>
            </div>
        </div>

    </main>

    <script src="js/ambiente.js"></script>
    <script src="js/conexao_com_api/carregar_post_index.js"></script>
    <script src="js/carousel.js"></script>
    <script src="js/header.js"></script>
    <script src="js/usuario_logado.js"></script>
</body>

</html>
