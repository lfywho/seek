<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seek - Vagas</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>

<body data-active-nav="vagas" id="todo">
    <header class="cabecalho"></header>

        <div class="carousel-wrapper">
            <button class="carousel-btn prev" aria-label="Categorias anteriores">&#10094;</button>

            <div class="carousel-viewport">
                <div class="carousel-track" id="categoriesTrack"></div>

            <button class="carousel-btn next" aria-label="Próximas categorias">&#10095;</button>

    <main class="conteudo conteudo-vagas">
        <section class="vagas-layout" aria-label="Catálogo de vagas">
            <aside class="vagas-filtros" aria-label="Filtros de vagas">
                <h2>Localização da Vaga</h2>
                <label class="filtro-opcao"><input type="radio" name="localizacao-vaga" checked>Todos</label>
                <label class="filtro-opcao"><input type="radio" name="localizacao-vaga">Remoto</label>
                <label class="filtro-opcao"><input type="radio" name="localizacao-vaga">Presencial</label>

                <h2>Tempo de postagem</h2>
                <p class="filtro-duracao-label">1 a <span id="vagasTempoMax">20</span> <span id="vagasTempoUnidade">dias</span></p>

                <div class="filtro-opcao-linha">
                    <label class="filtro-opcao filtro-opcao--inline"><input type="radio" name="tempo-postagem" value="hoje">Hoje</label>
                    <label class="filtro-opcao filtro-opcao--inline"><input type="radio" name="tempo-postagem" value="semana">Semana</label>
                    <label class="filtro-opcao filtro-opcao--inline"><input type="radio" name="tempo-postagem" value="mes">Mês</label>
                </div>

                <div class="filtro-opcao-linha">
                    <label class="filtro-opcao filtro-opcao--inline"><input type="radio" name="tempo-postagem" value="ano">Ano</label>
                    <label class="filtro-opcao filtro-opcao--inline"><input type="radio" name="tempo-postagem" value="dias" checked>Dias</label>
                </div>

                <div class="filtro-range-wrap">
                    <input type="range" min="1" max="365" value="7" class="filtro-range" id="vagasTempoRange" aria-label="Filtrar por tempo de postagem">
                </div>

                <h2>Categorias</h2>
                <p class="filtro-duracao-label" id="vagasCategoriasStatus" aria-live="polite">Carregando categorias...</p>
                <div id="vagasCategoriasList" aria-label="Categorias mais utilizadas"></div>
            </aside>

            <section class="vagas-grid" aria-label="Vagas em destaque" id="vagasGrid"></section>
        </section>
    </main>

    <!-- FAB: criar (post + vaga) -->
    <div class="fab" data-open="false" aria-label="Criar">
        
        <div class="fab__menu" role="menu" aria-label="Opções de criação">
            <a class="fab__item" role="menuitem" href="adicionarprojeto.html" title="Adicionar post">
                <img src="img/icons/addfotobranco.svg" alt="Adicionar post">
            </a>
            <a class="fab__item" role="menuitem" href="adicionarvaga.html" title="Adicionar vaga">
                <img src="img/icons/foguetepreto.svg" alt="Adicionar vaga">
            </a>
        </div>
        <button class="fab__main" type="button" aria-haspopup="menu" aria-expanded="false" title="Criar">
            +
        </button>
    </div>

    <script>
        // FAB toggle (sem arquivo novo)
        (function () {
            const fab = document.querySelector('.fab');
            const main = document.querySelector('.fab__main');
            if (!fab || !main) return;

            const setOpen = (open) => {
                fab.dataset.open = open ? 'true' : 'false';
                main.setAttribute('aria-expanded', open ? 'true' : 'false');
            };

            main.addEventListener('click', () => setOpen(fab.dataset.open !== 'true'));

            document.addEventListener('click', (e) => {
                if (!fab.contains(e.target)) setOpen(false);
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') setOpen(false);
            });
        })();
    </script>

    <script src="js/ambiente.js"></script>

    <script src="js/header.js"></script>
    <script src="js/usuario_logado.js"></script>
    <script src="js/conexao_com_api/carregar_vagas.js"></script>
    <script src="js/cursos-carousel.js"></script>
    <script src="js/vagas-filtros.js"></script>
    <script src="js/Acessibilidade/traducao.js"></script>
    <script src="js/Acessibilidade/ModoEscuro.js"></script>

</body>

</html>
